
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title> Login </title>
</head>
<body>

    <header>
        <h1>MediScan <span>& Find</span></h1>
        <p>Tu guía inteligente de salud</p>
    </header>

    <main class="login-container">
<div class="card" id="login-form">
    <h2>Iniciar Sesión</h2>
    <input type="email" id="loginEmail" placeholder="Tu correo electrónico">
    <input type="password" id="loginPass" placeholder="Tu contraseña">
    <button onclick="login()">Entrar</button>
    <p>¿No tienes cuenta? <a href="#" onclick="toggleAuth()">Regístrate aquí</a></p>
</div>

<div class="card" id="register-form" style="display: none;">
        <h2>Crear Cuenta</h2>
        <input type="text" id="regNombre" placeholder="Nombre completo">
        <input type="email" id="regEmail" placeholder="Correo electrónico">
        <input type="password" id="regPass" placeholder="Contraseña">
        <button onclick="registrar()">Registrarse</button>
        <p>¿Ya tienes cuenta? <a href="#" onclick="toggleAuth()">Inicia sesión</a></p>
    </div>

</main>

</body>
</html>

<script>

function toggleAuth() {
    const login = document.getElementById('login-form');
    const register = document.getElementById('register-form');

    if (login.style.display === "none") {
        login.style.display = "block";
        register.style.display = "none";
    } else {
        login.style.display = "none";
        register.style.display = "block";
    }
}

async function registrar() {
    const nombre = document.getElementById('regNombre').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPass').value;

    const response = await fetch('/api/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password })
    });

    const data = await response.json();
    if (response.ok) {
        alert("¡Cuenta creada! Ahora puedes iniciar sesión.");
        toggleAuth(); // Regresa al login
    } else {
        alert(data.error || "Error al registrar");
    }
}

async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPass').value;

    const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();
    if (response.ok) {
        localStorage.setItem('usuarioId', data.id); // Guardamos el ID de Firebase
        localStorage.setItem('nombreUsuario', data.nombre);
        window.location.href = "index.html";
        //window.location.href = "/index.html"; // Redirigir al buscador
    } else {
        alert(data.error);
    }
}
</script>
